<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Мем-баттл — выбор роли</title>
  <style>
    :root {
      --bg1:#070712; --bg2:#1a0f2e; --card:rgba(255,255,255,.06);
      --stroke:rgba(255,255,255,.10); --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.62); --yellow: #facc15; --purple:#a855f7;
    }
    *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    body{margin:0;min-height:100vh;color:var(--text);
      background:radial-gradient(1000px 600px at 20% 20%, #2b1b5a 0%, transparent 60%),
                 radial-gradient(900px 600px at 80% 30%, #3a104f 0%, transparent 60%),
                 linear-gradient(135deg,var(--bg1),var(--bg2));
      display:flex;align-items:center;justify-content:center;padding:24px;
    }
    .wrap{width:min(980px,100%);}
    .title{text-align:center;margin-bottom:18px;}
    .title h1{margin:0 0 6px;font-size:28px;letter-spacing:.5px;}
    .title p{margin:0;color:var(--muted);}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px;}
    .card{background:var(--card);border:1px solid var(--stroke);border-radius:20px;padding:18px;
      backdrop-filter: blur(10px); box-shadow:0 18px 40px rgba(0,0,0,.35);
      display:flex;flex-direction:column;gap:10px; min-height:160px;
    }
    .tag{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;}
    .badge{display:inline-flex;align-items:center;justify-content:center;
      width:34px;height:34px;border-radius:999px;border:1px solid var(--stroke);
      background:rgba(0,0,0,.2);}
    .badge b{font-size:14px;}
    .card h2{margin:0;font-size:18px;}
    .card p{margin:0;color:var(--muted);line-height:1.35;}
    .btn{margin-top:auto;display:flex;gap:10px;}
    a.button{flex:1;text-decoration:none;text-align:center;padding:12px 14px;border-radius:14px;font-weight:800;
      border:1px solid rgba(255,255,255,.12);}
    a.host{background:rgba(250,204,21,.12);color:rgba(255,255,255,.94);}
    a.player{background:rgba(168,85,247,.16);color:rgba(255,255,255,.94);}
    .note{margin-top:14px;text-align:center;color:var(--muted);font-size:12px;}
    .note code{color:rgba(255,255,255,.85);}
    @media (max-width:760px){.grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">
      <h1>Мем-баттл</h1>
      <p>Выбери роль</p>
    </div>

    <div class="grid">
      <div class="card">
        <div class="tag"><span class="badge"><b>🎛</b></span> Управление игрой</div>
        <h2>Хост</h2>
        <p>Создаёшь комнату, запускаешь раунды, следишь за таймерами и итогами.</p>
        <div class="btn">
          <a class="button host" id="goHost" href="/host">Перейти к хосту</a>
        </div>
      </div>

      <div class="card">
        <div class="tag"><span class="badge"><b>🎭</b></span> Игрок</div>
        <h2>Игрок</h2>
        <p>Вход в комнату, выбор мема из предложений или загрузка из галереи, голосование.</p>
        <div class="btn">
          <a class="button player" id="goPlayer" href="/player/">Перейти к игроку</a>
        </div>
      </div>
    </div>

    <div class="note">
      Быстрый вход: <code>/join/КОД</code> → откроет Player.
    </div>
  </div>

  <script>
    (function(){
      const params = new URLSearchParams(window.location.search || "");
      const room = params.get("room");
      const player = document.getElementById("goPlayer");
      if(room) player.href = "/player/?room=" + encodeURIComponent(room);
    })();
  </script>
</body>
</html>
